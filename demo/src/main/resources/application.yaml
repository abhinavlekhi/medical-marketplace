spring:
  application:
    name: medical_marketplace

  datasource:
    url: jdbc:postgresql://localhost:5432/medical_marketplace
    username: postgres
    password: your_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

jwt:
  secret: your_super_secret_key
  expiration: 3600000

server:
  port: 8080